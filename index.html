<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breno Souza Caparroz</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* --- ESTILIZAÇÃO GLOBAL (SEU CSS) --- */
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: #121212; /* Seu fundo escuro */
            font-family: 'Arial', sans-serif; /* Sua fonte */
            overflow-x: hidden;
            gap: 40px; /* Espaço entre o título e o slider */
            padding-bottom: 60px; /* Espaço extra para o rodapé não cobrir o conteúdo */
        }

        .shadow-dance-container {
            text-align: center;
        }

        .shadow-dance-text {
            font-size: 4rem;
            color: red; /* Letras vermelhas */
            display: flex;
            gap: 8px;
            transform-style: preserve-3d;
        }

        /* --- ANIMAÇÃO SEQUENCIAL DAS LETRAS --- */
        .shadow-dance-text span {
            display: inline-block;
            opacity: 0;
            transform-origin: center center;
            animation: 
                intro 1.5s ease-out forwards,
                exit 1s ease-in calc(1.5s + 3s) forwards,
                re-entry 1.2s ease-out calc(1.5s + 3s + 1s + 0.5s) forwards,
                shadow-dance 2s infinite calc(1.5s + 3s + 1s + 0.5s + 1.2s);
        }

        /* --- SEU KEYFRAME SHADOW-DANCE --- */
        @keyframes shadow-dance {
            0%, 100% { text-shadow: 5px 5px 0 #ff005e, 10px 10px 0 #00d4ff; }
            50% { text-shadow: -5px -5px 0 #00d4ff, -10px -10px 0 #ff005e; }
        }

        /* --- KEYFRAMES DA COREOGRAFIA --- */
        @keyframes intro {
            0% { transform: translateX(200px) translateY(0) scale(0.5); opacity: 0; }
            30% { transform: translateX(100px) translateY(-50px) scale(1.1); opacity: 0.8; }
            100% { transform: translateX(0) translateY(0) scale(1); opacity: 1; }
        }

        @keyframes exit {
            0% { transform: translateX(0) rotate(0deg) scale(1); opacity: 1; }
            100% { transform: translateX(-600px) rotate(-1080deg) scale(0.1); opacity: 0; }
        }

        @keyframes re-entry {
            0% { transform: translateX(600px) rotate(720deg) scale(0.5); opacity: 0; }
            100% { transform: translateX(0) rotate(0deg) scale(1); opacity: 1; }
        }

        /* --- DELAYS DO TEXTO (LETRA POR LETRA) --- */
        .shadow-dance-text span:nth-child(1)  { animation-delay: 0.0s, calc(4.5s + 0.0s), calc(6.0s + 0.0s), calc(7.2s + 0.0s); }
        .shadow-dance-text span:nth-child(2)  { animation-delay: 0.1s, calc(4.5s + 0.1s), calc(6.0s + 0.1s), calc(7.2s + 0.1s); }
        .shadow-dance-text span:nth-child(3)  { animation-delay: 0.2s, calc(4.5s + 0.2s), calc(6.0s + 0.2s), calc(7.2s + 0.2s); }
        .shadow-dance-text span:nth-child(4)  { animation-delay: 0.3s, calc(4.5s + 0.3s), calc(6.0s + 0.3s), calc(7.2s + 0.3s); }
        .shadow-dance-text span:nth-child(5)  { animation-delay: 0.4s, calc(4.5s + 0.4s), calc(6.0s + 0.4s), calc(7.2s + 0.4s); }
        .shadow-dance-text span:nth-child(6)  { animation-delay: 0.5s, calc(4.5s + 0.5s), calc(6.0s + 0.5s), calc(7.2s + 0.5s); }
        .shadow-dance-text span:nth-child(7)  { animation-delay: 0.6s, calc(4.5s + 0.6s), calc(6.0s + 0.6s), calc(7.2s + 0.6s); }
        .shadow-dance-text span:nth-child(8)  { animation-delay: 0.7s, calc(4.5s + 0.7s), calc(6.0s + 0.7s), calc(7.2s + 0.7s); }
        .shadow-dance-text span:nth-child(9)  { animation-delay: 0.8s, calc(4.5s + 0.8s), calc(6.0s + 0.8s), calc(7.2s + 0.8s); }
        .shadow-dance-text span:nth-child(10) { animation-delay: 0.9s, calc(4.5s + 0.9s), calc(6.0s + 0.9s), calc(7.2s + 0.9s); }
        .shadow-dance-text span:nth-child(11) { animation-delay: 1.0s, calc(4.5s + 1.0s), calc(6.0s + 1.0s), calc(7.2s + 1.0s); }
        .shadow-dance-text span:nth-child(12) { animation-delay: 1.1s, calc(4.5s + 1.1s), calc(6.0s + 1.1s), calc(7.2s + 1.1s); }
        .shadow-dance-text span:nth-child(13) { animation-delay: 1.2s, calc(4.5s + 1.2s), calc(6.0s + 1.2s), calc(7.2s + 1.2s); }
        .shadow-dance-text span:nth-child(14) { animation-delay: 1.3s, calc(4.5s + 1.3s), calc(6.0s + 1.3s), calc(7.2s + 1.3s); }
        .shadow-dance-text span:nth-child(15) { animation-delay: 1.4s, calc(4.5s + 1.4s), calc(6.0s + 1.4s), calc(7.2s + 1.4s); }
        .shadow-dance-text span:nth-child(16) { animation-delay: 1.5s, calc(4.5s + 1.5s), calc(6.0s + 1.5s), calc(7.2s + 1.5s); }
        .shadow-dance-text span:nth-child(17) { animation-delay: 1.6s, calc(4.5s + 1.6s), calc(6.0s + 1.6s), calc(7.2s + 1.6s); }
        .shadow-dance-text span:nth-child(18) { animation-delay: 1.7s, calc(4.5s + 1.7s), calc(6.0s + 1.7s), calc(7.2s + 1.7s); }
        .shadow-dance-text span:nth-child(19) { animation-delay: 1.8s, calc(4.5s + 1.8s), calc(6.0s + 1.8s), calc(7.2s + 1.8s); }
        .shadow-dance-text span:nth-child(20) { animation-delay: 1.9s, calc(4.5s + 1.9s), calc(6.0s + 1.9s), calc(7.2s + 1.9s); }

        /* --- ESTILIZAÇÃO DO SLIDER --- */
        .slider-container {
            width: 600px;
            height: 350px;
            overflow: hidden;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            position: relative;
            opacity: 0;
            animation: fadeInComponent 1s forwards 7.5s; 
        }

        .slider-wrapper {
            display: flex;
            width: 100%;
            height: 100%;
            transition: transform 0.5s ease-in-out;
        }

        .slider-wrapper img {
            width: 600px;
            height: 350px;
            object-fit: cover;
            flex-shrink: 0;
        }

        /* --- SEÇÃO DOS NOVOS CARDS --- */
        .cards-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            width: 90%;
            max-width: 1200px;
            opacity: 0;
            animation: fadeInComponent 1s forwards 7.5s; /* Aparece junto com o slider */
        }

        .photo-card {
            position: relative;
            height: 250px;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.4);
            cursor: pointer;
            background: #1e1e1e;
        }

        .photo-card img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease, opacity 0.6s ease;
        }

        /* Imagem de trás (padrão oculta/esperando o zoom) */
        .photo-card img.img-hover {
            opacity: 0;
            transform: scale(0.9);
        }

        /* Efeito de troca e Zoom ao passar o mouse */
        .photo-card:hover img.img-default {
            opacity: 0;
            transform: scale(1.1);
        }

        .photo-card:hover img.img-hover {
            opacity: 1;
            transform: scale(1.05);
        }

        /* --- ESTILIZAÇÃO DO RODAPÉ (MÍDIAS SOCIAIS) --- */
        footer {
            margin-top: 20px;
            display: flex;
            gap: 30px;
            opacity: 0;
            animation: fadeInComponent 1s forwards 7.5s; 
        }

        footer a {
            color: #ffffff;
            font-size: 2rem;
            transition: transform 0.3s ease, color 0.3s ease;
            text-decoration: none;
        }

        /* Efeitos ao passar o mouse nos ícones */
        footer a:hover {
            transform: scale(1.2);
        }
        footer a.instagram:hover { color: #e1306c; }
        footer a.whatsapp:hover { color: #25d366; }
        footer a.facebook:hover { color: #1877f2; }

        @keyframes fadeInComponent {
            to { opacity: 1; }
        }

        /* Responsividade */
        @media (max-width: 900px) {
            .cards-container {
                grid-template-columns: repeat(2, 1fr); /* 2x2 em tablets */
            }
        }

        @media (max-width: 650px) {
            .slider-container, .slider-wrapper img {
                width: 90vw;
                height: 250px;
            }
            .cards-container {
                grid-template-columns: 1fr; /* 1 coluna em celulares */
                width: 90vw;
            }
            .shadow-dance-text { font-size: 2.2rem; gap: 4px; }
            footer a { font-size: 1.7rem; }
        }
    </style>
</head>
<body>

    <div class="shadow-dance-container">
        <h1 class="shadow-dance-text">
            <span>B</span><span>R</span><span>E</span><span>N</span><span>O</span>
            <span style="width: 20px;"></span>
            <span>S</span><span>O</span><span>U</span><span>Z</span><span>A</span>
            <span style="width: 20px;"></span>
            <span>C</span><span>A</span><span>P</span><span>A</span><span>R</span><span>R</span><span>O</span><span>Z</span>
        </h1>
    </div>

    <!-- SEU SLIDER -->
    <div class="slider-container" id="slider">
        <div class="slider-wrapper" id="wrapper">
            <img src="./imagem/breno1.jpg" alt="Imagem 1">
            <img src="./imagem/breno2.jpg" alt="Imagem 2">
            <img src="./imagem/breno3.jpg" alt="Imagem 3">
            <img src="./imagem/breno4.avif" alt="Imagem 4">
            <img src="./imagem/breno5.jpg" alt="Imagem 5">
            <img src="./imagem/breno6.jpg" alt="Imagem 6">
            <img src="./imagem/breno7.jpg" alt="Imagem 7">
            <img src="./imagem/breno8.jpg" alt="Imagem 8">
        </div>
    </div>

    <!-- NOVOS 4 CARDS COM EFEITO DE ZOOM E TROCA -->
    <div class="cards-container">
        <!-- Card 1 -->
        <div class="photo-card">
            <img src="./imagem/breno1.jpg" alt="Breno 1" class="img-default">
            <img src="./imagem/breno2.jpg" alt="Breno 2" class="img-hover">
        </div>
        
        <!-- Card 2 -->
        <div class="photo-card">
            <img src="./imagem/breno3.jpg" alt="Breno 3" class="img-default">
            <img src="./imagem/breno4.avif" alt="Breno 4" class="img-hover">
        </div>

        <!-- Card 3 -->
        <div class="photo-card">
            <img src="./imagem/breno5.jpg" alt="Breno 5" class="img-default">
            <img src="./imagem/breno6.jpg" alt="Breno 6" class="img-hover">
        </div>

        <!-- Card 4 -->
        <div class="photo-card">
            <img src="./imagem/breno7.jpg" alt="Breno 7" class="img-default">
            <img src="./imagem/breno8.jpg" alt="Breno 8" class="img-hover">
        </div>
    </div>

    <footer>
        <a href="#" target="_blank" class="instagram" title="Instagram"><i class="fab fa-instagram"></i></a>
        <a href="#" target="_blank" class="whatsapp" title="WhatsApp"><i class="fab fa-whatsapp"></i></a>
        <a href="#" target="_blank" class="facebook" title="Facebook"><i class="fab fa-facebook-f"></i></a>
    </footer>

    <div vw class="enabled">
        <div vw-access-button class="active"></div>
        <div vw-plugin-wrapper>
            <div class="vw-plugin-top-wrapper"></div>
        </div>
    </div>
    <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
    <script>
        new window.VLibras.Widget('https://vlibras.gov.br/app');
    </script>

    <script>
        const slider = document.getElementById('slider');
        const wrapper = document.getElementById('wrapper');
        const images = document.querySelectorAll('#wrapper img');
        
        let currentIndex = 0;
        let timer = null;

        function showNextImage() {
            currentIndex++;
            if (currentIndex >= images.length) {
                currentIndex = 0;
            }
            const width = images[0].clientWidth;
            wrapper.style.transform = `translateX(${-currentIndex * width}px)`;
        }

        function startSlider() {
            if (!timer) {
                timer = setInterval(showNextImage, 3000);
            }
        }

        function stopSlider() {
            clearInterval(timer);
            timer = null;
        }

        slider.addEventListener('mouseenter', stopSlider);
        slider.addEventListener('mouseleave', startSlider);

        startSlider();

        window.addEventListener('resize', () => {
            const width = images[0].clientWidth;
            wrapper.style.transform = `translateX(${-currentIndex * width}px)`;
        });
    </script>
</body>
</html>
